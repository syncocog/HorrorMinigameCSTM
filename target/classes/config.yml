# Blood Ties Configuration File

game:
  min_players: 6
  max_players: 20
  round_duration: 180  # 3 minutes in seconds
  vote_duration: 30    # 30 seconds in seconds
  lobby_duration: 60   # 1 minute in seconds

roles:
  monster_kill_cooldown: 300  # 5 minutes in seconds
  healer_heal_cooldown: 600   # 10 minutes in seconds
  wizard_spell_cooldown: 120  # 2 minutes in seconds

karma:
  vote_monster: 10     # Karma gained for voting out the Monster
  vote_innocent: -3    # Karma lost for voting out an innocent player
  betray_team: -5      # Karma lost for betraying your team
  survive_round: 1     # Karma gained for surviving a round

sounds:
  enabled: true
  volume: 0.5
  pitch: 1.0

# General settings
debug_mode: false
auto_start: true
lobby_world: "world"
arena_world: "bloodties_arena"

# Lobby spawn location (will be set via command)
lobby:
  x: 0
  y: 64
  z: 0
  world: "world"

# Arena spawn locations (will be set via command)
arena:
  spawns:
    - x: 0
      y: 64
      z: 0
    - x: 10
      y: 64
      z: 10
    - x: -10
      y: 64
      z: -10
    - x: 20
      y: 64
      z: 0
    - x: -20
      y: 64
      z: 0
    - x: 0
      y: 64
      z: 20
    - x: 0
      y: 64
      z: -20